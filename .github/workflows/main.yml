name: Upanya CI/CD

on:
  push:
    branches:
      - development
      - testing
      - production

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: front-end
        run: npm ci

      - name: Build
        working-directory: front-end
        run: npm run build

      - name: Select Folder
        id: folder
        run: |
          if [ "${GITHUB_REF_NAME}" = "development" ]; then
            echo "folder=devo" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "testing" ]; then
            echo "folder=test" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "production" ]; then
            echo "folder=prod" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Deploy Folder
        run: |
          mkdir deploy
          cp -R front-end/dist/* deploy/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: deploy
          destination_dir: ${{ steps.folder.outputs.folder }}
          keep_files: true
