name: Build and Deploy GitHub Pages

run-name: "Deploy #${{ github.run_number }} | ${{ inputs.branch || github.ref_name }} | ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to deploy"
        required: true
        type: choice
        options:
          - production
          - development
          - testing

  push:
    branches:
      - production
      - development
      - testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ inputs.branch || github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Determine Deployment Branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_BRANCH="${{ inputs.branch }}"
          else
            SELECTED_BRANCH="${{ github.ref_name }}"
          fi

          case "$SELECTED_BRANCH" in
            production|development|testing)
              ;;
            *)
              echo "Error: Invalid branch selected: $SELECTED_BRANCH"
              exit 1
              ;;
          esac

          echo "Selected branch: $SELECTED_BRANCH"
          echo "name=$SELECTED_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 1
          submodules: false

      - name: Display Branch Information
        shell: bash
        run: |
          set -euo pipefail

          echo "Building branch: ${{ steps.branch.outputs.name }}"
          git branch --show-current
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify Frontend Project
        working-directory: ./front-end
        shell: bash
        run: |
          set -euo pipefail

          echo "Frontend files:"
          ls -la

          if [ ! -f "package.json" ]; then
            echo "Error: front-end/package.json was not found."
            exit 1
          fi

      - name: Install Frontend Dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build Frontend Application
        working-directory: ./front-end
        run: npm run build

      - name: Detect Build Folder
        id: output
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "front-end/dist" ]; then
            BUILD_DIR="front-end/dist"
          elif [ -d "front-end/build" ]; then
            BUILD_DIR="front-end/build"
          else
            echo "Error: Neither front-end/dist nor front-end/build exists."
            exit 1
          fi

          echo "Build folder: $BUILD_DIR"
          echo "directory=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      - name: Prepare GitHub Pages SPA
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="${{ steps.output.outputs.directory }}"

          echo "Preparing GitHub Pages files from: $BUILD_DIR"

          if [ ! -f "$BUILD_DIR/index.html" ]; then
            echo "Error: index.html was not found in $BUILD_DIR"
            exit 1
          fi

          # Prevent GitHub Pages from processing the build with Jekyll.
          touch "$BUILD_DIR/.nojekyll"

          # React BrowserRouter fallback:
          # GitHub Pages serves this file when /login or another route
          # does not match a physical file.
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html"

          echo "Prepared build files:"
          ls -la "$BUILD_DIR"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output.outputs.directory }}

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
