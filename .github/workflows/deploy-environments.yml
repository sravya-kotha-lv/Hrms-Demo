name: CI CD Deploy

run-name: "Build #${{ github.run_number }} | ${{ inputs.branch || github.ref_name }} | ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to build and deploy"
        required: true
        type: choice
        options:
          - production
          - dev
          - test

  push:
    branches:
      - production
      - dev
      - test

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Deploy ${{ inputs.branch || github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      # Determines whether the workflow was started manually
      # or automatically through a branch push.
      - name: Determine Deployment Branch
        id: branch
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_BRANCH="${{ inputs.branch }}"
          else
            SELECTED_BRANCH="${{ github.ref_name }}"
          fi

          echo "Selected branch: $SELECTED_BRANCH"
          echo "name=$SELECTED_BRANCH" >> "$GITHUB_OUTPUT"

      # Checks out the exact selected branch.
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 1

      - name: Display Selected Branch
        run: |
          echo "Building branch: ${{ steps.branch.outputs.name }}"
          git branch --show-current
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Build Completed
        run: |
          echo "=========================================="
          echo "Build completed successfully"
          echo "Branch: ${{ steps.branch.outputs.name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=========================================="
