name: CI CD Build

run-name: "Build #${{ github.run_number }} | ${{ inputs.branch || github.ref_name }} | ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to build"
        required: true
        type: choice
        options:
          - production
          - dev
          - test

  push:
    branches:
      - production
      - dev
      - test

permissions:
  contents: read

concurrency:
  group: build-${{ inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Deploy ${{ inputs.branch || github.ref_name }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./front-end

    steps:
      - name: Determine Deployment Branch
        id: branch
        working-directory: .
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_BRANCH="${{ inputs.branch }}"
          else
            SELECTED_BRANCH="${{ github.ref_name }}"
          fi

          echo "Selected branch: $SELECTED_BRANCH"
          echo "name=$SELECTED_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 1

      - name: Display Branch Information
        working-directory: .
        shell: bash
        run: |
          echo "Building branch: ${{ steps.branch.outputs.name }}"
          git branch --show-current
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify Frontend Project
        shell: bash
        run: |
          echo "Frontend folder files:"
          ls -la

          if [ ! -f "package.json" ]; then
            echo "Error: package.json was not found inside the front-end folder."
            exit 1
          fi

          echo "package.json found successfully."

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend Application
        run: npm run build

      - name: Verify Build Output
        shell: bash
        run: |
          if [ -d "dist" ]; then
            echo "Vite build output found in front-end/dist"
            ls -la dist
          elif [ -d "build" ]; then
            echo "React build output found in front-end/build"
            ls -la build
          else
            echo "Error: No dist or build folder was generated."
            exit 1
          fi

      - name: Build Completed
        working-directory: .
        shell: bash
        run: |
          echo "=========================================="
          echo "Frontend build completed successfully"
          echo "Branch: ${{ steps.branch.outputs.name }}"
          echo "Frontend folder: front-end"
          echo "Commit: ${{ github.sha }}"
          echo "=========================================="
